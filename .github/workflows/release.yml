name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  CHAT_ID: ${{ secrets.CHAT_ID }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      notify_message_id: ${{ steps.notify_start.outputs.message_id }}
      has_token: ${{ steps.check_token.outputs.has_token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check BOT_TOKEN
        id: check_token
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
          fi
      - name: Notify Release Start
        if: ${{ steps.check_token.outputs.has_token == 'true' }}
        id: notify_start
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.BOT_TOKEN }}
          chat_id: ${{ secrets.CHAT_ID }}
          type: start

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            binary: rfxh
            artifact: rfxh-linux-x86_64
            strip: true
          - os: macos-latest
            target: x86_64-macos
            binary: rfxh
            artifact: rfxh-macos-x86_64
            strip: true
          - os: macos-latest
            target: arm64-macos
            binary: rfxh
            artifact: rfxh-macos-arm64
            strip: true
            cmake_flags: -DCMAKE_SYSTEM_PROCESSOR=arm64
          - os: ubuntu-latest
            target: aarch64-android
            binary: rfxh
            artifact: rfxh-android-arm64
            strip: true
            ndk: true
            ndk_abi: arm64-v8a
          - os: ubuntu-latest
            target: x86_64-android
            binary: rfxh
            artifact: rfxh-android-x86_64
            strip: true
            ndk: true
            ndk_abi: x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' && !matrix.ndk }}
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake build-essential

      - name: Install Dependencies (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          brew update
          brew install cmake || true

      - name: Setup Android NDK
        if: ${{ matrix.ndk }}
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27
          add-to-path: true

      - name: Configure CMake (native)
        if: ${{ !matrix.ndk }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ matrix.cmake_flags }}

      - name: Configure CMake (Android NDK)
        if: ${{ matrix.ndk }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.setup_ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.ndk_abi }} \
            -DANDROID_PLATFORM=android-24

      - name: Build
        run: cmake --build build --parallel

      - name: Strip Binary
        if: ${{ matrix.strip }}
        run: |
          if command -v llvm-strip &> /dev/null; then
            llvm-strip --strip-all "build/${{ matrix.binary }}"
          else
            strip --strip-all "build/${{ matrix.binary }}" || true
          fi

      - name: Compute SHA256
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum "build/${{ matrix.binary }}" > "build/${{ matrix.binary }}.sha256"
          else
            shasum -a 256 "build/${{ matrix.binary }}" > "build/${{ matrix.binary }}.sha256"
          fi

      - name: Stage Artifacts
        run: |
          mkdir -p dist
          cp "build/${{ matrix.binary }}" dist/
          cp "build/${{ matrix.binary }}.sha256" dist/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Resolve Tag
        id: resolve_tag
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Prepare Release Package
        run: |
          mkdir -p release
          find artifacts/ -type f ! -name "*.sha256" | while read f; do
            dir=$(basename "$(dirname "$f")")
            cp "$f" "release/$dir"
            cd release
            if command -v sha256sum &> /dev/null; then
              sha256sum "$dir" > "$dir.sha256"
            else
              shasum -a 256 "$dir" > "$dir.sha256"
            fi
            cd ..
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    if: ${{ !cancelled() && needs.setup.outputs.has_token == 'true' }}
    needs: [setup, release]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Release Complete
        if: ${{ needs.release.result == 'success' && needs.setup.outputs.notify_message_id != '' }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.BOT_TOKEN }}
          chat_id: ${{ secrets.CHAT_ID }}
          type: complete
          delete_message_id: ${{ needs.setup.outputs.notify_message_id }}
          caption: |
            <b>rfxh ${{ inputs.tag }} Released!</b>

            <a href="https://github.com/${{ github.repository }}/releases/tag/${{ inputs.tag }}">GitHub Release</a>

      - name: Notify Failure
        if: ${{ needs.release.result != 'success' && needs.setup.outputs.notify_message_id != '' }}
        uses: ./.github/actions/telegram-notify
        with:
          bot_token: ${{ secrets.BOT_TOKEN }}
          chat_id: ${{ secrets.CHAT_ID }}
          type: failure
          delete_message_id: ${{ needs.setup.outputs.notify_message_id }}
